name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./toinpark-backend
          file: ./toinpark-backend/Dockerfile
          push: true
          # ডকার হাব ইউজার naimcse ব্যবহার করা হয়েছে
          tags: naimcse/toin-backend:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./toinpark-frontend
          file: ./toinpark-frontend/Dockerfile
          push: true
          # ডকার হাব ইউজার naimcse ব্যবহার করা হয়েছে
          tags: naimcse/toin-frontend:latest

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Pull and Run App
        run: |
          cd /opt/toinpark
          docker compose pull
          docker compose up -d
          docker image prune -f
